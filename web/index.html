<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckIn Voice</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"
            integrity="sha384-PARf28kmic36Ve+O3DnUerRXFtOQ7ZDqRDGpLcbljly5/N39T2OV3kt3QsWOKeAX"
            crossorigin="anonymous"></script>
</head>
<body>

<!-- Sign-in screen -->
<div id="sign-in-screen" class="screen">
    <div class="sign-in-content">
        <h1>CheckIn</h1>
        <p class="muted">Sign in with your Microsoft 365 account to get started.</p>
        <button id="sign-in-btn" class="btn-primary">Sign In with Microsoft</button>
        <p id="sign-in-error" class="error hidden"></p>
    </div>
</div>

<!-- Main app screen -->
<div id="app-screen" class="screen hidden">

    <!-- Toolbar -->
    <header id="toolbar">
        <div class="toolbar-left">
            <button id="back-btn" class="toolbar-btn hidden" title="Back">&larr;</button>
        </div>
        <div class="toolbar-right">
            <button id="stop-speech-btn" class="toolbar-btn hidden" title="Stop speaking">&#128263;</button>
            <button id="settings-btn" class="toolbar-btn" title="Settings">&#9881;</button>
        </div>
    </header>

    <!-- Summary view -->
    <main id="summary-view">
        <div id="loading" class="hidden">
            <p class="accent">Checking in...</p>
        </div>
        <div id="summary-content"></div>
        <div id="error-display" class="hidden">
            <p id="error-text" class="error"></p>
            <button id="retry-btn" class="btn-link">Retry</button>
        </div>
    </main>

    <!-- Detail view -->
    <main id="detail-view" class="hidden">
        <div id="detail-header"></div>
        <hr class="divider">
        <div id="detail-body"></div>
    </main>

    <!-- Reply modal -->
    <div id="reply-modal" class="hidden">
        <div class="reply-container">
            <div class="reply-header">
                <button id="reply-cancel-btn" class="toolbar-btn error-text">&#10005;</button>
                <span id="reply-to-label" class="accent"></span>
                <button id="reply-send-btn" class="toolbar-btn" disabled>&#9993;</button>
            </div>
            <textarea id="reply-draft" placeholder="Type your reply..."></textarea>
        </div>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel" class="hidden">
        <div class="settings-container">
            <h2>Settings</h2>
            <label class="setting-row">
                <span>Enable Teams</span>
                <input type="checkbox" id="setting-teams">
            </label>
            <label class="setting-row">
                <span>Voice on Start</span>
                <input type="checkbox" id="setting-voice">
            </label>
            <hr class="divider">
            <button id="sign-out-btn" class="btn-link error-text">Sign Out</button>
            <hr class="divider">
            <button id="settings-close-btn" class="btn-link">Close</button>
        </div>
    </div>

    <!-- Mic status notice -->
    <div id="mic-notice" class="hidden"></div>

    <!-- Floating mic button -->
    <button id="mic-btn" title="Click to speak">
        <svg id="mic-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="12" rx="3" ry="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
    </button>

</div>

<script src="app.js"></script>
</body>
</html>
